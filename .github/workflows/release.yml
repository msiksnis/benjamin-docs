name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify tag matches published package
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"

          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version"
            exit 1
          fi

          published_version="$(npm view "benjamin-docs@$package_version" version)"
          if [ "$published_version" != "$package_version" ]; then
            echo "npm does not report benjamin-docs@$package_version"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists."
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Published npm package: benjamin-docs@${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --latest || gh release view "$GITHUB_REF_NAME" >/dev/null
